server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: productos-route
          uri: http://localhost:8081
          predicates:
            - Path=/productos/**
            - Method=GET,POST
          filters:
             - name: RewritePath
               args:
                regexp: /productos/(?<segment>.*)
                replacement: /api/productos/${segment}
             - name: FiltroSesion
             
        - id: usuario-route
          uri: http://localhost:8082
          predicates:
            - Path=/usuarios/autenticar
            - Method=POST
          filters:
             - name: RewritePath
               args:
                regexp: /usuarios/autenticar
                replacement: /api/usuarios/autenticar
           
        - id: pedido-route
          uri: http://localhost:8083
          predicates:
            - Path=/pedidos/**
            - Method=GET,POST
          filters:
             - name: RewritePath
               args:
                regexp: /pedidos/(?<segment>.*)
                replacement: /api/pedidos/${segment}

                
                